<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 待办事项</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="添加新任务..." required>
            <button type="submit">添加</button>
        </form>
        <ul id="todo-list"></ul>
        <p class="privacy-note">🔒 您的待办事项仅保存在本地浏览器中，不会上传到服务器，完全私密安全。</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
